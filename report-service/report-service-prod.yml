# report-service — production overrides
spring:
  datasource:
    url: jdbc:postgresql://${DB_REPORTS_HOST}:5432/banking_reports
    username: ${DB_REPORTS_USERNAME}
    password: '{cipher}${DB_REPORTS_PASSWORD_ENCRYPTED}'
    hikari:
      maximum-pool-size: 10

banking:
  jwt:
    secret: '{cipher}${JWT_SECRET_ENCRYPTED}'
  report:
    s3:
      bucket: ${S3_STATEMENTS_BUCKET}
      expiry-hours: 1  # shorter expiry in production

aws:
  region: ${AWS_REGION}
