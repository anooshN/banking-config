# api-gateway — base config
server:
  port: 8080

spring:
  application:
    name: api-gateway

banking:
  jwt:
    secret: ${JWT_SECRET}
  gateway:
    rate-limiting:
      default-replenish-rate: 10
      default-burst-capacity: 20
      auth-replenish-rate: 5     # stricter on auth endpoints
      auth-burst-capacity: 10
    circuit-breaker:
      timeout-duration: 30s
      sliding-window-size: 10
      failure-rate-threshold: 50

springdoc:
  swagger-ui:
    path: /swagger-ui.html
    urls:
      - name: Auth Service
        url: /api/v1/auth/v3/api-docs
      - name: User Service
        url: /api/v1/users/v3/api-docs
      - name: Account Service
        url: /api/v1/accounts/v3/api-docs
      - name: Transaction Service
        url: /api/v1/transactions/v3/api-docs
      - name: Payment Service
        url: /api/v1/payments/v3/api-docs
      - name: Card Service
        url: /api/v1/cards/v3/api-docs
      - name: Loan Service
        url: /api/v1/loans/v3/api-docs
      - name: Report Service
        url: /api/v1/reports/v3/api-docs
      - name: Notification Service
        url: /api/v1/notifications/v3/api-docs
