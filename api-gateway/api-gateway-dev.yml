# api-gateway — dev overrides
spring:
  data:
    redis:
      host: localhost
      port: 6379

eureka:
  client:
    service-url:
      defaultZone: http://eureka:eureka-secret@localhost:8761/eureka/

banking:
  jwt:
    secret: dev-secret-key-that-is-at-least-32-characters-long
  cors:
    allowed-origins:
      - http://localhost:5173
      - http://localhost:3000
      - http://127.0.0.1:5173
