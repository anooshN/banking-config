# auth-service — dev overrides
spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/banking_auth
    username: banking
    password: banking-secret
    hikari:
      maximum-pool-size: 5
      minimum-idle: 2
      connection-timeout: 30000
  data:
    redis:
      host: localhost
      port: 6379
  kafka:
    bootstrap-servers: localhost:9092
    properties:
      schema.registry.url: http://localhost:8085

banking:
  jwt:
    secret: dev-secret-key-that-is-at-least-32-characters-long
  auth:
    max-failed-attempts: 10  # more lenient in dev
    lockout-duration-minutes: 5
