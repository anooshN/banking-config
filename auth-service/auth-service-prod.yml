# auth-service — production overrides
spring:
  datasource:
    url: jdbc:postgresql://${DB_AUTH_HOST}:5432/banking_auth
    username: ${DB_AUTH_USERNAME}
    password: '{cipher}${DB_AUTH_PASSWORD_ENCRYPTED}'
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000
      leak-detection-threshold: 60000
  data:
    redis:
      host: ${REDIS_HOST}
      port: 6379
      password: '{cipher}${REDIS_PASSWORD_ENCRYPTED}'
      ssl:
        enabled: true
      lettuce:
        pool:
          max-active: 32
          max-idle: 16

banking:
  jwt:
    secret: '{cipher}${JWT_SECRET_ENCRYPTED}'
  auth:
    max-failed-attempts: 5
    lockout-duration-minutes: 30

logging:
  level:
    com.banking.auth: INFO
