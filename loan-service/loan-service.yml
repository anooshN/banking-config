# loan-service — base config
server:
  port: 8091

spring:
  application:
    name: loan-service
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  flyway:
    enabled: true
    locations: classpath:db/migration
  kafka:
    consumer:
      group-id: loan-service-group

banking:
  loan:
    types:
      PERSONAL:
        min-amount: 1000.00
        max-amount: 50000.00
        min-tenure-months: 6
        max-tenure-months: 60
        interest-rate-range: "8.5-18.0"
      HOME:
        min-amount: 50000.00
        max-amount: 5000000.00
        min-tenure-months: 60
        max-tenure-months: 360
        interest-rate-range: "6.5-9.5"
      AUTO:
        min-amount: 5000.00
        max-amount: 200000.00
        min-tenure-months: 12
        max-tenure-months: 84
        interest-rate-range: "7.0-12.0"
      PERSONAL:
        min-amount: 1000.00
        max-amount: 50000.00
        min-tenure-months: 6
        max-tenure-months: 60
    emi-reminder-days-before: 5
    late-payment-penalty-percent: 2.0
    prepayment-penalty-percent: 1.0

springdoc:
  api-docs:
    path: /v3/api-docs
