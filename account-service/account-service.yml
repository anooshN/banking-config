# account-service — base config
server:
  port: 8083

spring:
  application:
    name: account-service
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        jdbc.batch_size: 50
        order_inserts: true
  flyway:
    enabled: true
    locations: classpath:db/migration
  kafka:
    consumer:
      group-id: account-service-group
  cache:
    type: redis
    redis:
      time-to-live: 300000  # 5 minutes

banking:
  account:
    default-currency: USD
    overdraft-limit: 0
    max-accounts-per-user: 10

springdoc:
  api-docs:
    path: /v3/api-docs
