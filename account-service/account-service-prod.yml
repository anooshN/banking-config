# account-service — production overrides
spring:
  datasource:
    url: jdbc:postgresql://${DB_ACCOUNTS_HOST}:5432/banking_accounts
    username: ${DB_ACCOUNTS_USERNAME}
    password: '{cipher}${DB_ACCOUNTS_PASSWORD_ENCRYPTED}'
    hikari:
      maximum-pool-size: 25
      minimum-idle: 5
  data:
    redis:
      host: ${REDIS_HOST}
      port: 6379
      password: '{cipher}${REDIS_PASSWORD_ENCRYPTED}'
      ssl.enabled: true
  cache:
    redis:
      time-to-live: 300000

banking:
  jwt:
    secret: '{cipher}${JWT_SECRET_ENCRYPTED}'
